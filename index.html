<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Interpretation Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .chat-bubble { max-width: 85%; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .wave-bar { transition: height 0.1s ease; min-height: 2px; }
    </style>
</head>
<body class="bg-slate-50 font-sans h-screen flex flex-col overflow-hidden text-slate-900">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
            </div>
            <div class="flex flex-col">
                <h1 class="text-lg font-bold tracking-tight leading-none">Interpretation <span class="text-indigo-600 font-black">PRO</span></h1>
                <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Diagnostic Mode</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="status-group" class="flex items-center gap-2 px-3 py-1.5 bg-slate-100 rounded-full border border-slate-200">
                <div id="status-dot" class="w-2 h-2 bg-slate-400 rounded-full"></div>
                <span id="status-text" class="text-[10px] font-black text-slate-500 uppercase tracking-widest leading-none">Standby</span>
            </div>
            <input type="password" id="api-key" placeholder="Gemini API Key" class="text-sm px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none w-48 shadow-inner bg-slate-50 font-mono">
        </div>
    </header>

    <main class="flex-1 overflow-hidden flex flex-col md:flex-row p-4 gap-4">
        <aside class="w-full md:w-80 flex flex-col gap-4 shrink-0 overflow-y-auto pr-1">
            <!-- Main Controls -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h2 class="text-[11px] font-black text-slate-400 uppercase mb-4 tracking-widest">Controls</h2>
                <button id="start-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-4 rounded-2xl transition-all shadow-md active:scale-[0.98] flex items-center justify-center gap-3">
                    Connect Call Audio
                </button>
            </div>

            <!-- Language & Diagnostics -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h2 class="text-[10px] font-black text-slate-800 uppercase mb-3 tracking-widest">Settings</h2>
                <select id="target-lang" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-bold appearance-none mb-4">
                    <option value="English">Interpret to English</option>
                    <option value="Spanish">Interpret to Spanish</option>
                    <option value="French">Interpret to French</option>
                    <option value="Portuguese">Interpret to Portuguese</option>
                </select>
                
                <button id="check-models-btn" class="w-full border-2 border-slate-100 text-slate-400 text-[10px] font-black py-2 rounded-xl hover:bg-slate-50 transition-all uppercase tracking-widest">
                    Check Allowed Models
                </button>
            </div>

            <div class="bg-slate-900 p-5 rounded-3xl flex-1 flex flex-col min-h-[150px] shadow-xl overflow-hidden border border-slate-800">
                <h2 class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2">System Diagnostics</h2>
                <div id="debug-logs" class="flex-1 font-mono text-[10px] text-indigo-300/80 overflow-y-auto leading-relaxed space-y-1">
                    <div class="text-slate-500 italic">> Model discovery initialized...</div>
                </div>
            </div>
        </aside>

        <section class="flex-1 bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col overflow-hidden relative">
            <div id="chat-feed" class="chat-container flex-1 overflow-y-auto p-8 space-y-6 bg-slate-50/10">
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-300 px-10 text-center">
                    <p class="text-slate-800 font-black text-xl mb-2 tracking-tight">Ready to Interpret</p>
                    <p class="text-sm text-slate-400 leading-relaxed max-w-xs">Connecting audio will start the 12-second interpretation pulses. If model errors persist, use the "Check Allowed Models" button.</p>
                </div>
            </div>

            <div class="px-6 py-4 border-t border-slate-100 flex items-center gap-4 bg-white">
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest shrink-0">Signal Monitor</span>
                <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden relative">
                    <div id="visualizer-bar" class="h-full bg-indigo-500 w-0 transition-all duration-300 rounded-full shadow-[0_0_8px_rgba(99,102,241,0.4)]"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let mediaRecorder;
        let audioContext;
        let analyser;
        let isRecording = false;
        let contextHistory = [];
        
        const startBtn = document.getElementById('start-btn');
        const checkModelsBtn = document.getElementById('check-models-btn');
        const chatFeed = document.getElementById('chat-feed');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const visualizer = document.getElementById('visualizer-bar');
        const debugLogs = document.getElementById('debug-logs');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = type === 'error' ? 'text-red-400' : (type === 'success' ? 'text-green-400' : 'text-indigo-300/80');
            div.innerText = `> ${msg}`;
            debugLogs.appendChild(div);
            debugLogs.scrollTop = debugLogs.scrollHeight;
        }

        async function listAllowedModels() {
            const apiKey = document.getElementById('api-key').value;
            if (!apiKey) { alert("Please provide an API Key first."); return; }
            log("Fetching allowed models for your key...");
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await response.json();
                if (data.models) {
                    log("--- Allowed Models ---", "success");
                    data.models.forEach(m => {
                        const name = m.name.replace('models/', '');
                        if (name.includes('flash')) log(name, "success");
                        else log(name);
                    });
                } else {
                    log("No models returned. Check API Key.", "error");
                }
            } catch (err) {
                log("Fetch Error: " + err.message, "error");
            }
        }

        checkModelsBtn.addEventListener('click', listAllowedModels);

        function appendMessage(text) {
            const emptyState = document.getElementById('empty-state');
            if (emptyState) emptyState.remove();
            
            let role = 'Client';
            let content = text;

            if (text.toLowerCase().includes('agent:')) {
                role = 'Agent (You)';
                content = text.split(/agent:/i)[1]?.trim() || text;
            } else if (text.toLowerCase().includes('client:')) {
                role = 'Client (Portal)';
                content = text.split(/client:/i)[1]?.trim() || text;
            }
            
            const isClient = role.includes('Client');
            const div = document.createElement('div');
            div.className = `flex ${isClient ? 'justify-start' : 'justify-end'}`;
            div.innerHTML = `
                <div class="chat-bubble p-5 rounded-[1.5rem] text-sm leading-relaxed ${isClient ? 'bg-white border border-slate-200 text-slate-800 shadow-sm' : 'bg-indigo-600 text-white shadow-md'}">
                    <div class="text-[9px] uppercase font-black opacity-30 mb-2">${role}</div>
                    <div class="font-medium tracking-tight">${content}</div>
                </div>
            `;
            chatFeed.appendChild(div);
            chatFeed.scrollTo({ top: chatFeed.scrollHeight, behavior: 'smooth' });

            contextHistory.push(text);
            if (contextHistory.length > 5) contextHistory.shift();
        }

        async function fetchWithRetry(apiKey, payload, retries = 3, delay = 3000) {
            // Updated variation list for 2026 stable standards
            const modelVariations = [
                "gemini-2.0-flash",
                "gemini-1.5-flash",
                "gemini-1.5-flash-latest"
            ];

            for (let modelName of modelVariations) {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: { 'Content-Type': 'application/json' }
                    });
                    const data = await response.json();
                    if (response.ok && !data.error) return data;
                    if (data.error?.message.toLowerCase().includes('quota')) {
                        log(`Quota limit. Waiting...`, "error");
                        await new Promise(r => setTimeout(r, delay));
                        continue; 
                    }
                    log(`Trying next model...`);
                } catch (err) { }
            }
            throw new Error("API could not find a supported model. Click 'Check Allowed Models' to diagnose.");
        }

        async function interpretAudio(base64Audio, apiKey) {
            const targetLang = document.getElementById('target-lang').value;
            const contextStr = contextHistory.length > 0 ? `PREVIOUS: ${contextHistory.join(' | ')}` : "Start of call.";

            const payload = {
                contents: [{
                    parts: [
                        { text: `CONTEXT: Professional call. ${contextStr}
                        TASK: Listen to this 12-second audio and transcribe/translate.
                        Agent: The microphone speaker.
                        Client: The portal/tab audio speaker. (Translate their words to ${targetLang}).
                        FORMAT:
                        Agent: [text]
                        Client: [text]
                        If silence, output exactly "Silence".` },
                        { inlineData: { mimeType: "audio/webm", data: base64Audio } }
                    ]
                }]
            };

            visualizer.style.width = "100%";
            try {
                const data = await fetchWithRetry(apiKey, payload);
                const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text && text.trim().toLowerCase() !== "silence") {
                    text.split('\n').forEach(line => {
                        if (line.trim().length > 3) appendMessage(line.trim());
                    });
                    log("Interpretation received.", "success");
                } else {
                    log("Pulse processed (No speech).");
                }
            } catch (err) {
                log("Processing Error: " + err.message, "error");
            } finally {
                setTimeout(() => visualizer.style.width = "0%", 300);
            }
        }

        async function startSession(stream, apiKey) {
            log("Session started. Monitoring audio...");
            audioContext = new AudioContext();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 64;
            source.connect(analyser);

            mediaRecorder = new MediaRecorder(stream);
            isRecording = true;

            mediaRecorder.ondataavailable = async (e) => {
                if (e.data.size > 2000) {
                    const reader = new FileReader();
                    reader.readAsDataURL(e.data);
                    reader.onloadend = () => {
                        const base64 = reader.result.split(',')[1];
                        interpretAudio(base64, apiKey);
                    };
                }
            };

            mediaRecorder.start();
            setInterval(() => {
                if (mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    mediaRecorder.start();
                }
            }, 12000); 

            statusDot.className = 'w-2 h-2 bg-green-500 shadow-md';
            statusText.innerText = 'Connected';
        }

        startBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('api-key').value;
            if (!apiKey) { alert("Please provide a Gemini API Key."); return; }
            if (isRecording) { location.reload(); return; }

            try {
                log("Requesting System Audio + Mic...");
                const tabStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                const audioCtx = new AudioContext();
                const dest = audioCtx.createMediaStreamDestination();
                audioCtx.createMediaStreamSource(tabStream).connect(dest);
                audioCtx.createMediaStreamSource(micStream).connect(dest);
                
                startBtn.innerText = "Listening...";
                startBtn.classList.replace('bg-indigo-600', 'bg-red-500');
                await startSession(dest.stream, apiKey);
            } catch (err) {
                log("Setup Denied: " + err.message, "error");
            }
        });
    </script>
</body>
</html>
